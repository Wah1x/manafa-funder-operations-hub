<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manafa — Funder Operations Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#FAFAFA; --card:#FFFFFF; --fg:#09090B; --mut:#71717A; --bd:#E4E4E7; --pri:#18181B; --pri-fg:#FAFAFA; --ring:#A1A1AA; --err:#DC2626; }
  @media (prefers-color-scheme: dark){ :root{ --bg:#09090B; --card:#0C0C0F; --fg:#FAFAFA; --mut:#A1A1AA; --bd:rgba(255,255,255,.10); --pri:#FAFAFA; --pri-fg:#18181B; --ring:#52525B; --err:#EF4444; } }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Geist",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--fg);
    min-height:100vh;display:grid;place-items:center;padding:24px;-webkit-font-smoothing:antialiased}
  .card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:30px 28px;
    box-shadow:0 10px 40px rgba(0,0,0,.08)}
  .lock{width:44px;height:44px;border-radius:11px;background:var(--pri);color:var(--pri-fg);display:grid;place-items:center;margin-bottom:18px}
  .lock svg{width:22px;height:22px}
  h1{font-size:17px;font-weight:600;letter-spacing:-.01em}
  .sub{font-size:13px;color:var(--mut);margin-top:5px;line-height:1.5}
  form{margin-top:20px;display:flex;flex-direction:column;gap:10px}
  label{font-size:12px;font-weight:500;color:var(--mut)}
  .in-wrap{position:relative}
  input{width:100%;height:40px;padding:0 40px 0 12px;border:1px solid var(--bd);background:var(--bg);color:var(--fg);
    border-radius:9px;font:inherit;font-size:14px;outline:none;transition:border-color .12s,box-shadow .12s}
  input:focus{border-color:var(--ring);box-shadow:0 0 0 3px color-mix(in srgb,var(--ring) 30%,transparent)}
  .toggle{position:absolute;right:6px;top:6px;width:28px;height:28px;border:none;background:transparent;color:var(--mut);
    cursor:pointer;border-radius:6px;display:grid;place-items:center}
  .toggle:hover{background:color-mix(in srgb,var(--fg) 6%,transparent)}
  .toggle svg{width:16px;height:16px}
  button.submit{height:40px;border:none;border-radius:9px;background:var(--pri);color:var(--pri-fg);font:inherit;font-size:14px;
    font-weight:500;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px}
  button.submit:hover{opacity:.9}
  button.submit:disabled{opacity:.6;cursor:default}
  .err{font-size:12.5px;color:var(--err);min-height:16px;line-height:1.4}
  .foot{font-size:11.5px;color:var(--mut);margin-top:16px;line-height:1.5}
  .spin{width:15px;height:15px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:sp .7s linear infinite;display:none}
  @keyframes sp{to{transform:rotate(360deg)}}
  .loading .spin{display:inline-block}
</style>
</head>
<body>
  <div class="card">
    <div class="lock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    <h1>Funder Operations Hub</h1>
    <div class="sub">This page is encrypted. Enter the access password to continue. Access is limited to approved viewers.</div>
    <form id="f" autocomplete="off">
      <label for="pw">Password</label>
      <div class="in-wrap">
        <input id="pw" type="password" placeholder="Enter password" autocomplete="off" autofocus>
        <button type="button" class="toggle" id="tg" aria-label="Show password" title="Show / hide"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
      <div class="err" id="err"></div>
      <button type="submit" class="submit" id="go"><span class="spin"></span><span id="golbl">Unlock</span></button>
    </form>
    <div class="foot">Manafa · Embedded Finance. If you don’t have the password, contact the Embedded Finance BA desk.</div>
  </div>

const MARKER="<!--MANAFA-FCT-v2-->";
const REMEMBER=true;
const SKEY="fct-pw";
async function decrypt(pw){
  const raw=Uint8Array.from(atob(CT), c=>c.charCodeAt(0));
  const salt=raw.slice(8,16), ct=raw.slice(16);
  const baseKey=await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveBits']);
  const bits=new Uint8Array(await crypto.subtle.deriveBits({name:'PBKDF2', salt, iterations:100000, hash:'SHA-256'}, baseKey, 384));
  const key=await crypto.subtle.importKey('raw', bits.slice(0,32), {name:'AES-CBC'}, false, ['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-CBC', iv:bits.slice(32,48)}, key, ct);
  return new TextDecoder().decode(pt);
}
function reveal(html){ document.open(); document.write(html); document.close(); }
async function tryUnlock(pw, fromCache){
  const err=document.getElementById('err'), go=document.getElementById('go'), f=document.getElementById('f');
  err.textContent=''; f.classList.add('loading'); go.disabled=true; document.getElementById('golbl').textContent='Unlocking…';
  try{
    const txt=await decrypt(pw);
    if(txt.indexOf(MARKER)!==0) throw new Error('bad');
    if(REMEMBER){ try{ sessionStorage.setItem(SKEY, pw); }catch(e){} }
    reveal(txt.slice(MARKER.length));
  }catch(e){
    if(fromCache){ try{ sessionStorage.removeItem(SKEY); }catch(_){ } }
    f.classList.remove('loading'); go.disabled=false; document.getElementById('golbl').textContent='Unlock';
    err.textContent='Incorrect password. Try again.';
    const pwi=document.getElementById('pw'); pwi.select(); pwi.focus();
  }
}
document.getElementById('f').addEventListener('submit', e=>{ e.preventDefault(); const pw=document.getElementById('pw').value; if(pw) tryUnlock(pw,false); });
document.getElementById('tg').addEventListener('click', ()=>{ const i=document.getElementById('pw'); i.type = i.type==='password'?'text':'password'; i.focus(); });
(function(){ if(!REMEMBER) return; let c=null; try{ c=sessionStorage.getItem(SKEY); }catch(e){} if(c) tryUnlock(c,true); })();
</script>
